root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/api"
  bin = "./tmp/main.exe"
  include_ext = ["go", "sql"]
  exclude_dir = ["tmp", "bin", "vendor", "specs", ".claude"]
  exclude_regex = ["_test\\.go"]
  delay = 500
  stop_on_error = true

[misc]
  clean_on_exit = true
